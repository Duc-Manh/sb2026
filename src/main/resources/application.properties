# ==============================================================
# CẤU HÌNH ỨNG DỤNG FACTORY - THỦY ĐIỆN SÔNG BUNG
# ==============================================================
spring.application.name=factory

# 1. CẤU HÌNH SERVER (Quan trọng để Ngrok có thể truy cập)
# Cho phép ứng dụng lắng nghe từ mọi nguồn (0.0.0.0) thay vì chỉ localhost
server.address=0.0.0.0
server.port=8080



# 4. BỎ QUA BẢO MẬT (Để thuận tiện cho việc test link Ngrok ban đầu)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# 5. CẤU HÌNH TẢI FILE (Nếu dự án của bạn có phần upload hồ sơ sáng kiến)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b